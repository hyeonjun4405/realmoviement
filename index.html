<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 영화 보관함</title>
    <!-- 라이브러리 불러오기 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- [중요] 여기에 본인의 Firebase Config를 넣으세요 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJv5-l1pOUvGePTwTlIIGn7fnKd_5VWzA",
            authDomain: "realmoviement.firebaseapp.com",
            projectId: "realmoviement",
            storageBucket: "realmoviement.firebasestorage.app",
            messagingSenderId: "375262433926",
            appId: "1:375262433926:web:de37344c3305c576ff7707"
        };
        // --------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "my-movie-app-v1"; // 고유 앱 ID

        window.FB = { db, auth, appId, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch, signInAnonymously, onAuthStateChanged };
    </script>
    <style>
        .star-container {
            display: inline-flex;
            position: relative;
            cursor: pointer;
        }
        .star-half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
        }
        .star-left { left: 0; }
        .star-right { right: 0; }
        
        /* 툴팁 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-tooltip {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { db, auth, appId, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch, signInAnonymously, onAuthStateChanged } = window.FB;

        const EDIT_PASSWORD = '909423';

        const initialMoviesData = [
            { title: "올빼미", rating: 3.0 }, { title: "소공녀", rating: 3.5 }, { title: "완벽한 타인", rating: 3.0 },
            { title: "이상한 나라의 수학자", rating: 2.5 }, { title: "스파이더맨: 파 프롬 홈", rating: 2.5 }, { title: "마션", rating: 3.5 },
            { title: "블랙 팬서", rating: 2.0 }, { title: "엑시트", rating: 2.5 }, { title: "안시성", rating: 1.5 },
            { title: "모가디슈", rating: 3.5 }, { title: "한산: 용의 출현", rating: 2.5 }, { title: "남산의 부장들", rating: 3.5 },
            { title: "화려한 휴가", rating: 3.0 }, { title: "국제시장", rating: 4.0 }, { title: "히말라야", rating: 2.0 },
            { title: "신과함께-인과 연", rating: 1.0 }, { title: "택시운전사", rating: 2.5 }, { title: "신과함께-죄와 벌", rating: 1.5 },
            { title: "1987", rating: 3.5 }, { title: "7번방의 선물", rating: 2.0 }, { title: "어벤져스: 엔드게임", rating: 4.5 },
            { title: "닥터 스트레인지", rating: 3.0 }, { title: "닥터 스트레인지: 대혼돈의 멀티버스", rating: 1.0 }, { title: "아이언맨", rating: 4.0 },
            { title: "나쁜 영화", rating: 4.0 }, { title: "악마는 프라다를 입는다 2", rating: 3.5 }, { title: "라라랜드", rating: 4.5 },
            { title: "세 얼간이", rating: 2.5 }, { title: "서울의 봄", rating: 3.5 }, { title: "노무현입니다", rating: 3.5 },
            { title: "무현, 두 도시 이야기", rating: 0.5 }, { title: "부당거래", rating: 3.5 }, { title: "신세계", rating: 4.0 },
            { title: "비상선언", rating: 1.5 }, { title: "올드보이", rating: 4.0 }, { title: "탑건: 매버릭", rating: 3.0 },
            { title: "노인을 위한 나라는 없다", rating: 4.5 }, { title: "란 12.3", rating: 0.5 }, { title: "공작", rating: 3.5 },
            { title: "헌트", rating: 4.0 }, { title: "리노의 도박사", rating: 4.0 }, { title: "뜨거운 오후", rating: 4.0 },
            { title: "펀치 드렁크 러브", rating: 5.0 }, { title: "프로젝트 헤일메리", rating: 3.5 }, { title: "살목지", rating: 2.0 },
            { title: "그랜드 부다페스트 호텔", rating: 4.5 }, { title: "파이트 클럽", rating: 2.5 }, { title: "시계태엽 오렌지", rating: 3.5 },
            { title: "헤어질 결심", rating: 5.0 }, { title: "애국청년 변희재", rating: 2.5 }
        ];

        const IconBox = ({ children, className = "" }) => (
            <div className={`inline-flex items-center justify-center ${className}`}>{children}</div>
        );

        const PasswordModal = ({ open, value, error, onChange, onSubmit, onClose }) => {
            const inputRef = useRef(null);
            useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 0); }, [open]);
            if (!open) return null;
            return (
                <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/50 p-4">
                    <form onSubmit={onSubmit} className="w-full max-w-sm bg-white rounded-3xl shadow-2xl border border-slate-100 p-6 text-left">
                        <div className="mb-4">
                            <p className="text-[10px] text-indigo-600 font-black tracking-widest uppercase mb-1">비밀번호 확인</p>
                            <h2 className="text-xl font-black text-slate-800">수정 권한이 필요합니다</h2>
                        </div>
                        <input ref={inputRef} type="password" value={value} onChange={(e) => onChange(e.target.value)} placeholder="비밀번호 입력" className="w-full px-4 py-3 bg-slate-50 border-2 border-transparent focus:border-indigo-200 focus:bg-white rounded-xl outline-none text-sm font-bold text-slate-700" />
                        {error && <p className="mt-2 text-xs font-bold text-red-500">{error}</p>}
                        <div className="flex justify-end gap-2 mt-5">
                            <button type="button" onClick={onClose} className="px-4 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm">취소</button>
                            <button type="submit" className="px-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg">확인</button>
                        </div>
                    </form>
                </div>
            );
        };

        const ReviewInput = ({ initialValue, onSave, requestPassword }) => {
            const [localValue, setLocalValue] = useState(initialValue || "");
            const [isSaved, setIsSaved] = useState(false);
            const [canEdit, setCanEdit] = useState(false);
            const [showTooltip, setShowTooltip] = useState(false);
            const inputRef = useRef(null);
            const hoverTimeout = useRef(null);

            useEffect(() => { setLocalValue(initialValue || ""); setCanEdit(false); }, [initialValue]);

            const handleMouseEnter = () => {
                if (localValue && !canEdit) {
                    hoverTimeout.current = setTimeout(() => {
                        setShowTooltip(true);
                    }, 1000);
                }
            };

            const handleMouseLeave = () => {
                if (hoverTimeout.current) clearTimeout(hoverTimeout.current);
                setShowTooltip(false);
            };

            const handleFocus = (e) => {
                if (canEdit) return;
                e.target.blur();
                requestPassword(() => {
                    setCanEdit(true);
                    setShowTooltip(false);
                    setTimeout(() => inputRef.current?.focus(), 0);
                });
            };

            const handleBlur = () => {
                if (localValue !== initialValue) {
                    onSave(localValue);
                    setIsSaved(true);
                    setTimeout(() => setIsSaved(false), 2000);
                }
                setCanEdit(false);
            };

            return (
                <div 
                    className="flex-1 relative group/input"
                    onMouseEnter={handleMouseEnter}
                    onMouseLeave={handleMouseLeave}
                >
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-lg">💬</div>
                    <input 
                        ref={inputRef} 
                        type="text" 
                        value={localValue} 
                        onFocus={handleFocus} 
                        onChange={(e) => setLocalValue(e.target.value)} 
                        onBlur={handleBlur} 
                        onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} 
                        placeholder="한줄평..." 
                        className="w-full pl-12 pr-20 py-3 bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-xl text-sm outline-none font-medium text-slate-600 overflow-hidden text-ellipsis" 
                    />
                    
                    {showTooltip && (
                        <div className="absolute bottom-full left-0 mb-3 w-full z-[60] animate-tooltip pointer-events-none">
                            <div className="bg-slate-800 text-white text-xs p-3 rounded-xl shadow-2xl border border-slate-700 leading-relaxed break-all">
                                {localValue}
                            </div>
                            <div className="w-3 h-3 bg-slate-800 rotate-45 absolute -bottom-1.5 left-6 border-r border-b border-slate-700"></div>
                        </div>
                    )}

                    {isSaved && <div className="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-500 font-bold text-[10px]">✓ 저장됨</div>}
                </div>
            );
        };

        const RatingBarChart = ({ movies }) => {
            const chartData = useMemo(() => {
                const ratings = [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5];
                const counts = ratings.map((rating) => ({ rating, count: movies.filter((m) => Number(m.rating) === rating).length }));
                const maxCount = Math.max(1, ...counts.map(i => i.count));
                return { counts, maxCount };
            }, [movies]);
            return (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8">
                    <h2 className="font-black text-slate-800 text-base mb-4">별점 분포</h2>
                    <div className="space-y-2">
                        {chartData.counts.map((item) => (
                            <div key={item.rating} className="grid grid-cols-[42px_1fr_32px] items-center gap-3">
                                <div className="text-xs font-black text-slate-500 text-right">{item.rating.toFixed(1)}</div>
                                <div className="h-6 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${Math.max(4, (item.count / chartData.maxCount) * 100)}%` }}></div>
                                </div>
                                <div className="text-xs font-bold text-slate-400">{item.count}편</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const DetailModal = ({ movie, onClose, onSave }) => {
            const [detailText, setDetailText] = useState(movie?.detailedReview || "");
            const [isSaved, setIsSaved] = useState(false);
            useEffect(() => { setDetailText(movie?.detailedReview || ""); setIsSaved(false); }, [movie]);
            if (!movie) return null;
            const handleSave = () => { onSave(movie.id, detailText); setIsSaved(true); setTimeout(() => setIsSaved(false), 2000); };
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4 text-left">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-6">
                        <div className="flex justify-between items-start mb-4">
                            <h2 className="text-xl font-black">{movie.title} - 상세 리뷰</h2>
                            <button onClick={onClose} className="text-2xl font-black">×</button>
                        </div>
                        <textarea value={detailText} onChange={(e) => setDetailText(e.target.value)} className="w-full h-64 p-4 bg-slate-50 rounded-2xl outline-none resize-none" />
                        <div className="flex justify-between items-center mt-4">
                            <span className="text-xs text-slate-400">{detailText.length}자 {isSaved && "✓ 저장됨"}</span>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 bg-slate-100 rounded-xl font-bold">닫기</button>
                                <button onClick={handleSave} className="px-4 py-2 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 0.5점 단위 별점 선택 컴포넌트 ---
        const StarRatingInput = ({ value, onChange }) => {
            const [hover, setHover] = useState(0);
            const displayValue = hover || value;

            return (
                <div className="flex items-center gap-1">
                    {[1, 2, 3, 4, 5].map((index) => (
                        <div key={index} className="star-container text-2xl relative">
                            <span className="text-slate-200">★</span>
                            <div 
                                className="absolute top-0 left-0 overflow-hidden text-yellow-400 transition-all pointer-events-none"
                                style={{ width: displayValue >= index ? '100%' : displayValue >= index - 0.5 ? '50%' : '0%' }}
                            >
                                <span>★</span>
                            </div>
                            <div className="star-half star-left" onMouseEnter={() => setHover(index - 0.5)} onMouseLeave={() => setHover(0)} onClick={() => onChange(index - 0.5)} />
                            <div className="star-half star-right" onMouseEnter={() => setHover(index)} onMouseLeave={() => setHover(0)} onClick={() => onChange(index)} />
                        </div>
                    ))}
                    <span className="ml-2 text-sm font-black text-slate-400 min-w-[24px]">{value.toFixed(1)}</span>
                </div>
            );
        };

        // --- 별점 표시 컴포넌트 ---
        const RatingStarsDisplay = ({ rating }) => (
            <div className="flex items-center gap-0.5">
                {[1, 2, 3, 4, 5].map((index) => (
                    <div key={index} className="relative text-base">
                        <span className="text-gray-300">★</span>
                        <div 
                            className="absolute top-0 left-0 overflow-hidden text-yellow-400"
                            style={{ width: rating >= index ? '100%' : rating >= index - 0.5 ? '50%' : '0%' }}
                        >
                            <span>★</span>
                        </div>
                    </div>
                ))}
            </div>
        );

        // --- 수정 가능한 평점 컴포넌트 ---
        const EditableRating = ({ value, onSave, requestPassword }) => {
            const [isEditing, setIsEditing] = useState(false);

            if (isEditing) {
                return (
                    <div onMouseLeave={() => setIsEditing(false)} className="bg-white px-2 py-1 rounded-lg border border-indigo-100 shadow-sm animate-tooltip">
                        <StarRatingInput 
                            value={value} 
                            onChange={(newVal) => {
                                onSave(newVal);
                                setIsEditing(false);
                            }} 
                        />
                    </div>
                );
            }

            return (
                <div 
                    onClick={() => requestPassword(() => setIsEditing(true))}
                    className="cursor-pointer hover:bg-yellow-50 p-1 rounded-lg transition-all flex items-center gap-2 group/stars"
                    title="클릭하여 평점 수정"
                >
                    <RatingStarsDisplay rating={value} />
                    <span className="text-xs font-black text-slate-400 group-hover/stars:text-indigo-600">{value.toFixed(1)}</span>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [sortOrder, setSortOrder] = useState('desc');
            const [newTitle, setNewTitle] = useState("");
            const [newRating, setNewRating] = useState(5.0);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedMovieId, setSelectedMovieId] = useState(null);
            const [passwordAction, setPasswordAction] = useState(null);
            const [passwordInput, setPasswordInput] = useState("");
            const [passwordError, setPasswordError] = useState("");

            useEffect(() => {
                signInAnonymously(auth);
                const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const moviesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
                return onSnapshot(query(moviesCollection), (snapshot) => {
                    const movieList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (movieList.length === 0 && loading) {
                        seedInitialData();
                    } else {
                        setMovies(movieList);
                        setLoading(false);
                    }
                });
            }, [user]);

            const seedInitialData = async () => {
                const moviesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
                const batch = writeBatch(db);
                initialMoviesData.forEach((movie, index) => {
                    const docId = `movie_${index}_${Date.now()}`;
                    batch.set(doc(moviesCollection, docId), { title: movie.title, rating: movie.rating, review: "", detailedReview: "", createdAt: Date.now() + index });
                });
                await batch.commit();
            };

            const submitPassword = (e) => {
                e.preventDefault();
                if (passwordInput === EDIT_PASSWORD) {
                    const action = passwordAction;
                    setPasswordAction(null); setPasswordInput(""); setPasswordError("");
                    if (action) action();
                } else { setPasswordError("틀렸습니다."); }
            };

            const handleAddMovie = async (e) => {
                e.preventDefault();
                if (!newTitle.trim()) return;
                const docId = `movie_${Date.now()}`;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', docId), { title: newTitle.trim(), rating: parseFloat(newRating), review: "", detailedReview: "", createdAt: Date.now() });
                setNewTitle(""); setNewRating(5.0); setShowAddForm(false);
            };

            const handleDeleteMovie = (id) => setPasswordAction(() => async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id));
            });

            const handleReviewSave = async (id, text) => await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { review: text });
            const handleDetailSave = async (id, text) => await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { detailedReview: text });
            
            // 평점 직접 수정 핸들러
            const handleRatingSave = async (id, newRating) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { rating: newRating });
            };

            const filteredMovies = useMemo(() => [...movies].filter(m => m.title.toLowerCase().includes(searchTerm.toLowerCase())).sort((a, b) => sortOrder === 'desc' ? b.rating - a.rating : a.rating - b.rating), [movies, searchTerm, sortOrder]);
            const selectedMovie = useMemo(() => movies.find(m => m.id === selectedMovieId) || null, [movies, selectedMovieId]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400">데이터 로딩 중...</div>;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <header className="mb-8 flex justify-between items-center">
                        <h1 className="text-3xl font-black text-slate-800">🎬 나만의 영화 보관함</h1>
                        <button onClick={() => setPasswordAction(() => () => setShowAddForm(!showAddForm))} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition-all active:scale-95">추가</button>
                    </header>

                    <RatingBarChart movies={movies} />

                    {showAddForm && (
                        <div className="bg-white p-6 rounded-2xl shadow-xl mb-8 border border-indigo-50">
                            <form onSubmit={handleAddMovie} className="flex flex-col md:flex-row gap-6">
                                <input value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="영화 제목을 입력하세요" className="flex-1 p-3 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-100 font-bold" />
                                <div className="flex flex-col justify-center">
                                    <span className="text-[10px] font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">별점 선택 (0.5 단위)</span>
                                    <StarRatingInput value={newRating} onChange={setNewRating} />
                                </div>
                                <button type="submit" className="bg-slate-800 hover:bg-black text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md">리스트에 추가</button>
                            </form>
                        </div>
                    )}

                    <div className="mb-6 flex gap-4">
                        <div className="relative flex-1">
                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">⌕</span>
                            <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="제목 검색..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none shadow-sm text-sm" />
                        </div>
                        <button onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')} className="px-5 py-3 bg-white rounded-2xl font-bold border border-slate-200 shadow-sm whitespace-nowrap">↕ {sortOrder === 'desc' ? '높은순' : '낮은순'}</button>
                    </div>

                    <div className="space-y-4">
                        {filteredMovies.map(movie => (
                            <div key={movie.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-start md:items-center gap-4 group hover:border-indigo-200 transition-all">
                                <div className="w-full md:w-1/4">
                                    <h3 className="font-bold truncate text-slate-800">{movie.title}</h3>
                                    <EditableRating 
                                        value={Number(movie.rating)} 
                                        onSave={(newVal) => handleRatingSave(movie.id, newVal)} 
                                        requestPassword={requestPassword} 
                                    />
                                </div>
                                <ReviewInput initialValue={movie.review} onSave={text => handleReviewSave(movie.id, text)} requestPassword={a => setPasswordAction(() => a)} />
                                <div className="flex items-center gap-2 w-full md:w-auto">
                                    <button onClick={() => setPasswordAction(() => () => setSelectedMovieId(movie.id))} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-xs font-black border transition-all ${movie.detailedReview ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-white text-slate-400 border-slate-200 hover:border-indigo-200'}`}>상세 리뷰</button>
                                    <button onClick={() => handleDeleteMovie(movie.id)} className="p-2 text-slate-200 hover:text-red-500 transition-all text-xl">🗑</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-12 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest pb-8">
                        평점을 클릭하여 수정할 수 있으며, 마우스를 한줄평에 1초간 올리면 전체 내용을 볼 수 있습니다.
                    </div>

                    <DetailModal movie={selectedMovie} onClose={() => setSelectedMovieId(null)} onSave={handleDetailSave} />
                    <PasswordModal open={Boolean(passwordAction)} value={passwordInput} error={passwordError} onChange={setPasswordInput} onSubmit={submitPassword} onClose={() => setPasswordAction(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
