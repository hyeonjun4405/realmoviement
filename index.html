<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 영화 보관함</title>
    <!-- 라이브러리 불러오기 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- [중요] 여기에 본인의 Firebase Config를 넣으세요 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBJv5-l1pOUvGePTwTlIIGn7fnKd_5VWzA",
            authDomain: "realmoviement.firebaseapp.com",
            projectId: "realmoviement",
            storageBucket: "realmoviement.firebasestorage.app",
            messagingSenderId: "375262433926",
            appId: "1:375262433926:web:de37344c3305c576ff7707"
        };
        // --------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "my-movie-app-v1";

        window.FB = { db, auth, appId, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch, signInAnonymously, onAuthStateChanged };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        
        .star-container { display: inline-flex; position: relative; cursor: pointer; user-select: none; }
        .star-half { position: absolute; top: 0; width: 50%; height: 100%; z-index: 20; }
        .star-left { left: 0; }
        .star-right { right: 0; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-tooltip { animation: fadeIn 0.2s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { db, auth, appId, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, query, getDocs, writeBatch, signInAnonymously, onAuthStateChanged } = window.FB;

        const EDIT_PASSWORD = '909423';

        const initialMoviesData = [
            { title: "올빼미", rating: 3.0 }, { title: "소공녀", rating: 3.5 }, { title: "완벽한 타인", rating: 3.0 },
            { title: "이상한 나라의 수학자", rating: 2.5 }, { title: "스파이더맨: 파 프롬 홈", rating: 2.5 }, { title: "마션", rating: 3.5 },
            { title: "블랙 팬서", rating: 2.0 }, { title: "엑시트", rating: 2.5 }, { title: "안시성", rating: 1.5 },
            { title: "모가디슈", rating: 3.5 }, { title: "한산: 용의 출현", rating: 2.5 }, { title: "남산의 부장들", rating: 3.5 },
            { title: "화려한 휴가", rating: 3.0 }, { title: "국제시장", rating: 4.0 }, { title: "히말라야", rating: 2.0 },
            { title: "신과함께-인과 연", rating: 1.0 }, { title: "택시운전사", rating: 2.5 }, { title: "신과함께-죄와 벌", rating: 1.5 },
            { title: "1987", rating: 3.5 }, { title: "7번방의 선물", rating: 2.0 }, { title: "어벤져스: 엔드게임", rating: 4.5 },
            { title: "닥터 스트레인지", rating: 3.0 }, { title: "닥터 스트레인지: 대혼돈의 멀티버스", rating: 1.0 }, { title: "아이언맨", rating: 4.0 },
            { title: "나쁜 영화", rating: 4.0 }, { title: "악마는 프라다를 입는다 2", rating: 3.5 }, { title: "라라랜드", rating: 4.5 },
            { title: "세 얼간이", rating: 2.5 }, { title: "서울의 봄", rating: 3.5 }, { title: "노무현입니다", rating: 3.5 },
            { title: "무현, 두 도시 이야기", rating: 0.5 }, { title: "부당거래", rating: 3.5 }, { title: "신세계", rating: 4.0 },
            { title: "비상선언", rating: 1.5 }, { title: "올드보이", rating: 4.0 }, { title: "탑건: 매버릭", rating: 3.0 },
            { title: "노인을 위한 나라는 없다", rating: 4.5 }, { title: "란 12.3", rating: 0.5 }, { title: "공작", rating: 3.5 },
            { title: "헌트", rating: 4.0 }, { title: "리노의 도박사", rating: 4.0 }, { title: "뜨거운 오후", rating: 4.0 },
            { title: "펀치 드렁크 러브", rating: 5.0 }, { title: "프로젝트 헤일메리", rating: 3.5 }, { title: "살목지", rating: 2.0 },
            { title: "그랜드 부다페스트 호텔", rating: 4.5 }, { title: "파이트 클럽", rating: 2.5 }, { title: "시계태엽 오렌지", rating: 3.5 },
            { title: "헤어질 결심", rating: 5.0 }, { title: "애국청년 변희재", rating: 2.5 }
        ];

        // --- 비밀번호 모달 ---
        const PasswordModal = ({ open, value, error, onChange, onSubmit, onClose }) => {
            const inputRef = useRef(null);
            useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 0); }, [open]);
            if (!open) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 text-left">
                    <form onSubmit={onSubmit} className="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8">
                        <div className="mb-6 text-left">
                            <p className="text-[10px] text-indigo-600 font-black tracking-widest uppercase mb-1">Authorization</p>
                            <h2 className="text-2xl font-black text-slate-800">비밀번호 확인</h2>
                            <p className="text-sm text-slate-400 font-medium mt-1 text-left">수정 권한을 위해 비밀번호가 필요합니다.</p>
                        </div>
                        <input ref={inputRef} type="password" value={value} onChange={(e) => onChange(e.target.value)} placeholder="비밀번호 입력" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl outline-none text-lg font-bold text-slate-700 transition-all text-left" />
                        {error && <p className="mt-3 text-sm font-bold text-red-500 flex items-center gap-1"><span>⚠</span> {error}</p>}
                        <div className="flex justify-end gap-3 mt-8">
                            <button type="button" onClick={onClose} className="px-6 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-sm transition-colors">취소</button>
                            <button type="submit" className="px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm shadow-lg shadow-indigo-200 transition-all">확인</button>
                        </div>
                    </form>
                </div>
            );
        };

        // --- 상세 리뷰 모달 ---
        const DetailModal = ({ movie, onClose, onSave }) => {
            const [detailText, setDetailText] = useState(movie?.detailedReview || "");
            const [isSaved, setIsSaved] = useState(false);
            useEffect(() => { setDetailText(movie?.detailedReview || ""); setIsSaved(false); }, [movie]);
            if (!movie) return null;
            const handleSave = () => { onSave(movie.id, detailText); setIsSaved(true); setTimeout(() => setIsSaved(false), 2000); };
            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 text-left">
                    <div className="w-full max-w-3xl bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-8 border-b border-slate-50 flex items-start justify-between text-left">
                            <div className="text-left">
                                <p className="text-[10px] text-indigo-600 font-black tracking-widest uppercase mb-1">Detailed Analysis</p>
                                <h2 className="text-3xl font-black text-slate-800 text-left">{movie.title}</h2>
                                <div className="flex items-center gap-3 mt-2 text-sm font-bold text-slate-400">
                                    <span className="text-yellow-500">★ {Number(movie.rating).toFixed(1)}</span>
                                    {movie.review && <span className="truncate max-w-[400px]">/ {movie.review}</span>}
                                </div>
                            </div>
                            <button onClick={onClose} className="w-12 h-12 rounded-full bg-slate-50 hover:bg-slate-100 text-slate-400 text-2xl font-light transition-all flex items-center justify-center">✕</button>
                        </div>
                        <div className="p-8 flex-1 overflow-y-auto text-left">
                            <textarea value={detailText} onChange={(e) => setDetailText(e.target.value)} placeholder="이 영화에 대한 깊이 있는 생각을 기록해보세요..." className="w-full min-h-[350px] p-6 bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-3xl outline-none resize-none text-base leading-relaxed text-slate-700 font-medium transition-all text-left" autoFocus />
                        </div>
                        <div className="p-8 bg-slate-50/50 flex justify-between items-center text-left">
                            <span className="text-sm text-slate-400 font-bold">{detailText.length} 자 작성됨 {isSaved && <span className="ml-3 text-emerald-500 font-black animate-pulse">✓ 저장됨</span>}</span>
                            <div className="flex gap-3">
                                <button onClick={onClose} className="px-8 py-3 rounded-2xl bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold transition-all">닫기</button>
                                <button onClick={handleSave} className="px-8 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold shadow-xl shadow-indigo-100 transition-all">내용 저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 별점 선택 컴포넌트 ---
        const StarRatingInput = ({ value, onChange, size = "text-3xl" }) => {
            const [hover, setHover] = useState(0);
            const displayValue = hover || value;
            return (
                <div className="flex items-center gap-1">
                    {[1, 2, 3, 4, 5].map((index) => (
                        <div key={index} className={`star-container ${size} relative`}>
                            <span className="text-slate-200 transition-colors">★</span>
                            <div className="absolute top-0 left-0 overflow-hidden text-yellow-400 transition-all pointer-events-none text-left" style={{ width: displayValue >= index ? '100%' : displayValue >= index - 0.5 ? '50%' : '0%' }}>
                                <span className="text-left">★</span>
                            </div>
                            <div className="star-half star-left" onMouseEnter={() => setHover(index - 0.5)} onMouseLeave={() => setHover(0)} onClick={(e) => { e.stopPropagation(); onChange(index - 0.5); }} />
                            <div className="star-half star-right" onMouseEnter={() => setHover(index)} onMouseLeave={() => setHover(0)} onClick={(e) => { e.stopPropagation(); onChange(index); }} />
                        </div>
                    ))}
                    <span className={`ml-3 font-black text-indigo-600 min-w-[32px] ${size === "text-3xl" ? "text-lg" : "text-sm"}`}>{value.toFixed(1)}</span>
                </div>
            );
        };

        // --- 단순 별점 표시 컴포넌트 ---
        const RatingStarsDisplay = ({ rating }) => (
            <div className="flex items-center gap-0.5 text-left">
                {[1, 2, 3, 4, 5].map((index) => (
                    <div key={index} className="relative text-lg">
                        <span className="text-slate-200 text-left">★</span>
                        <div className="absolute top-0 left-0 overflow-hidden text-yellow-400 text-left" style={{ width: rating >= index ? '100%' : rating >= index - 0.5 ? '50%' : '0%' }}>
                            <span className="text-left">★</span>
                        </div>
                    </div>
                ))}
            </div>
        );

        // --- 수정 가능한 별점 컴포넌트 (신규) ---
        const EditableRating = ({ value, onSave, requestPassword }) => {
            const [isEditing, setIsEditing] = useState(false);
            
            if (isEditing) {
                return (
                    <div onMouseLeave={() => setIsEditing(false)} className="bg-white p-2 rounded-xl shadow-xl border border-indigo-100 animate-tooltip z-50 absolute -top-2 -left-2 bg-white">
                        <StarRatingInput value={value} onChange={(newVal) => { onSave(newVal); setIsEditing(false); }} size="text-2xl" />
                    </div>
                );
            }
            return (
                <div 
                    onClick={(e) => { e.stopPropagation(); requestPassword(() => setIsEditing(true)); }} 
                    className="cursor-pointer hover:bg-yellow-50 p-1 -ml-1 rounded-lg transition-all flex items-center gap-2 group/stars" 
                    title="클릭하여 별점 수정"
                >
                    <RatingStarsDisplay rating={value} />
                    <span className="text-xs font-black text-slate-400 group-hover/stars:text-indigo-600">{value.toFixed(1)}</span>
                </div>
            );
        };

        // --- 한줄평 입력 컴포넌트 ---
        const ReviewInput = ({ initialValue, onSave, requestPassword }) => {
            const [localValue, setLocalValue] = useState(initialValue || "");
            const [isSaved, setIsSaved] = useState(false);
            const [canEdit, setCanEdit] = useState(false);
            const [showTooltip, setShowTooltip] = useState(false);
            const inputRef = useRef(null);
            const hoverTimeout = useRef(null);

            useEffect(() => { setLocalValue(initialValue || ""); setCanEdit(false); }, [initialValue]);

            const handleMouseEnter = () => { if (localValue && !canEdit) hoverTimeout.current = setTimeout(() => setShowTooltip(true), 1000); };
            const handleMouseLeave = () => { if (hoverTimeout.current) clearTimeout(hoverTimeout.current); setShowTooltip(false); };
            
            const handleFocus = (e) => {
                if (canEdit) return;
                e.target.blur();
                requestPassword(() => {
                    setCanEdit(true);
                    setShowTooltip(false);
                    setTimeout(() => inputRef.current?.focus(), 0);
                });
            };

            const handleBlur = () => {
                if (localValue !== initialValue) {
                    onSave(localValue);
                    setIsSaved(true);
                    setTimeout(() => setIsSaved(false), 2000);
                }
                setCanEdit(false);
            };

            return (
                <div className="flex-1 relative group/input text-left" onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave}>
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xl pointer-events-none transition-colors group-focus-within/input:text-indigo-400">💬</div>
                    <input ref={inputRef} type="text" value={localValue} onFocus={handleFocus} onChange={(e) => setLocalValue(e.target.value)} onBlur={handleBlur} onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} placeholder="한줄평을 남겨보세요..." className="w-full pl-14 pr-24 py-4 bg-slate-50 border-2 border-transparent focus:border-indigo-100 focus:bg-white rounded-2xl text-sm outline-none font-medium text-slate-600 transition-all text-left" />
                    
                    {showTooltip && (
                        <div className="absolute bottom-full left-0 mb-4 w-full z-[70] animate-tooltip pointer-events-none text-left">
                            <div className="bg-slate-800 text-white text-sm p-4 rounded-[1.25rem] shadow-2xl border border-slate-700 leading-relaxed font-medium text-left">
                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest text-left">전체 코멘트</p>
                                {localValue}
                            </div>
                            <div className="w-4 h-4 bg-slate-800 rotate-45 absolute -bottom-2 left-8 border-r border-b border-slate-700 text-left"></div>
                        </div>
                    )}
                    
                    {isSaved && <div className="absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500 font-black text-[10px] animate-pulse">✓ SAVED</div>}
                </div>
            );
        };

        const RatingBarChart = ({ movies }) => {
            const chartData = useMemo(() => {
                const ratings = [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5];
                const counts = ratings.map((rating) => ({ rating, count: movies.filter((m) => Number(m.rating) === rating).length }));
                const maxCount = Math.max(1, ...counts.map(i => i.count));
                return { counts, maxCount };
            }, [movies]);
            return (
                <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-10 text-left">
                    <div className="flex items-end justify-between mb-8 text-left">
                        <div className="text-left">
                            <h2 className="font-black text-slate-800 text-xl text-left">별점 분포 통계</h2>
                            <p className="text-sm text-slate-400 font-bold mt-1 text-left">총 {movies.length}편의 영화 데이터</p>
                        </div>
                        <div className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full tracking-tighter uppercase">Cloud sync</div>
                    </div>
                    <div className="space-y-3">
                        {chartData.counts.map((item) => (
                            <div key={item.rating} className="grid grid-cols-[50px_1fr_40px] items-center gap-4">
                                <div className="text-xs font-black text-slate-400 text-right">{item.rating.toFixed(1)}</div>
                                <div className="h-8 bg-slate-50 rounded-2xl overflow-hidden relative border border-slate-100/50">
                                    <div className="h-full bg-indigo-500 rounded-2xl transition-all duration-1000 ease-out shadow-inner" style={{ width: `${Math.max(4, (item.count / chartData.maxCount) * 100)}%` }}></div>
                                </div>
                                <div className="text-xs font-black text-slate-800">{item.count}편</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [sortOrder, setSortOrder] = useState('desc');
            const [newTitle, setNewTitle] = useState("");
            const [newRating, setNewRating] = useState(5.0);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedMovieId, setSelectedMovieId] = useState(null);
            const [passwordAction, setPasswordAction] = useState(null);
            const [passwordInput, setPasswordInput] = useState("");
            const [passwordError, setPasswordError] = useState("");

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB) {
                        clearInterval(interval);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                        signInAnonymously(auth).catch(e => console.error(e));
                        onAuthStateChanged(auth, setUser);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, collection, query, onSnapshot } = window.FB;
                const moviesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
                return onSnapshot(query(moviesCollection), (snapshot) => {
                    const movieList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (movieList.length === 0 && loading) {
                        seedInitialData();
                    } else {
                        setMovies(movieList);
                        setLoading(false);
                    }
                });
            }, [user]);

            const seedInitialData = async () => {
                const { db, appId, collection, doc, writeBatch } = window.FB;
                const moviesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'movies');
                const batch = writeBatch(db);
                initialMoviesData.forEach((movie, index) => {
                    const docId = `movie_${index}_${Date.now()}`;
                    batch.set(doc(moviesCollection, docId), { title: movie.title, rating: movie.rating, review: "", detailedReview: "", createdAt: Date.now() + index });
                });
                await batch.commit();
            };

            const submitPassword = (e) => {
                e.preventDefault();
                if (passwordInput === EDIT_PASSWORD) {
                    const action = passwordAction;
                    setPasswordAction(null); setPasswordInput(""); setPasswordError("");
                    if (action) action();
                } else { setPasswordError("비밀번호가 틀렸습니다."); }
            };

            const handleAddMovie = async (e) => {
                e.preventDefault();
                if (!newTitle.trim()) return;
                const { db, appId, setDoc, doc } = window.FB;
                const docId = `movie_${Date.now()}`;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', docId), { title: newTitle.trim(), rating: parseFloat(newRating), review: "", detailedReview: "", createdAt: Date.now() });
                setNewTitle(""); setNewRating(5.0); setShowAddForm(false);
            };

            const handleDeleteMovie = (id) => setPasswordAction(() => async () => {
                const { db, appId, deleteDoc, doc } = window.FB;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id));
            });

            const handleReviewSave = async (id, text) => {
                const { db, appId, updateDoc, doc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { review: text });
            };
            
            const handleDetailSave = async (id, text) => {
                const { db, appId, updateDoc, doc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { detailedReview: text });
            };

            const handleRatingSave = async (id, newRating) => {
                const { db, appId, updateDoc, doc } = window.FB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movies', id), { rating: newRating });
            };

            const avgRating = useMemo(() => {
                if (movies.length === 0) return "0.00";
                return (movies.reduce((acc, curr) => acc + curr.rating, 0) / movies.length).toFixed(2);
            }, [movies]);

            const filteredMovies = useMemo(() => [...movies].filter(m => m.title.toLowerCase().includes(searchTerm.toLowerCase())).sort((a, b) => sortOrder === 'desc' ? b.rating - a.rating : a.rating - b.rating), [movies, searchTerm, sortOrder]);
            const selectedMovie = useMemo(() => movies.find(m => m.id === selectedMovieId) || null, [movies, selectedMovieId]);

            const requestPasswordWrapper = (action) => {
                setPasswordInput("");
                setPasswordError("");
                setPasswordAction(() => action);
            };

            if (loading && !user) return <div className="h-screen flex flex-col items-center justify-center font-black text-slate-300 gap-4">
                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p>로딩 중...</p>
            </div>;

            return (
                <div className="max-w-5xl mx-auto p-6 md:p-12 text-left">
                    <header className="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6 text-left">
                        <div className="text-left">
                            <p className="text-indigo-600 font-black tracking-widest text-[10px] uppercase mb-2 text-left">Movie Archive System</p>
                            <h1 className="text-5xl font-black text-slate-900 tracking-tight flex items-center gap-4 text-left">🎬 영화 보관함</h1>
                            <div className="flex items-center gap-6 mt-6 text-left">
                                <div className="text-left">
                                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest text-left">총 영화 수</p>
                                    <p className="text-2xl font-black text-slate-800 text-left">{movies.length}</p>
                                </div>
                                <div className="w-px h-8 bg-slate-200 text-left"></div>
                                <div className="text-left">
                                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest text-left">평균 점수</p>
                                    <p className="text-2xl font-black text-slate-800 text-left">{avgRating} <span className="text-sm text-yellow-500">★</span></p>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => requestPasswordWrapper(() => setShowAddForm(!showAddForm))} className="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-5 rounded-[1.5rem] font-black shadow-2xl shadow-indigo-100 transition-all active:scale-95 text-lg">추가</button>
                    </header>

                    <RatingBarChart movies={movies} />

                    {showAddForm && (
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl mb-12 border border-indigo-50 animate-tooltip text-left">
                            <h3 className="text-xl font-black mb-8 text-slate-800 text-left">새 영화 기록</h3>
                            <form onSubmit={handleAddMovie} className="flex flex-col gap-8 text-left">
                                <input value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="영화 제목..." className="w-full p-6 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 text-xl font-bold transition-all text-left" autoFocus />
                                <div className="flex flex-col md:flex-row items-center justify-between gap-6 px-4 text-left">
                                    <div className="flex flex-col items-center md:items-start text-left">
                                        <span className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest text-left">별점 선택 (0.5 단위)</span>
                                        <StarRatingInput value={newRating} onChange={setNewRating} />
                                    </div>
                                    <button type="submit" className="w-full md:w-auto bg-slate-900 hover:bg-black text-white px-12 py-5 rounded-2xl font-black transition-all shadow-xl">리스트에 추가</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="mb-8 flex flex-col md:flex-row gap-4 text-left">
                        <div className="relative flex-1 group text-left">
                            <span className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-xl text-left">⌕</span>
                            <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="제목 검색..." className="w-full pl-16 pr-6 py-5 bg-white border border-slate-100 rounded-[1.5rem] outline-none shadow-sm font-bold text-left" />
                        </div>
                        <button onClick={() => setSortOrder(sortOrder === 'desc' ? 'asc' : 'desc')} className="px-8 py-5 bg-white rounded-[1.5rem] font-black border border-slate-100 whitespace-nowrap shadow-sm hover:bg-slate-50 transition-all flex items-center gap-3 text-left">
                            <span className="text-indigo-600 text-left">↕</span>
                            {sortOrder === 'desc' ? '높은순' : '낮은순'}
                        </button>
                    </div>

                    <div className="space-y-6 text-left">
                        {filteredMovies.map(movie => (
                            <div key={movie.id} className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-50 flex flex-col md:flex-row items-start md:items-center gap-6 group hover:border-indigo-100 transition-all text-left">
                                <div className="w-full md:w-[220px] shrink-0 text-left">
                                    <h3 className="font-black text-xl text-slate-800 truncate mb-2 text-left" title={movie.title}>{movie.title}</h3>
                                    <div className="relative">
                                        <EditableRating 
                                            value={Number(movie.rating)} 
                                            onSave={(val) => handleRatingSave(movie.id, val)} 
                                            requestPassword={requestPasswordWrapper} 
                                        />
                                    </div>
                                </div>
                                <ReviewInput initialValue={movie.review} onSave={text => handleReviewSave(movie.id, text)} requestPassword={requestPasswordWrapper} />
                                <div className="flex items-center gap-3 w-full md:w-auto shrink-0 mt-4 md:mt-0 text-left">
                                    <button onClick={() => requestPasswordWrapper(() => setSelectedMovieId(movie.id))} className={`flex-1 md:flex-none px-6 py-4 rounded-2xl text-[11px] font-black border transition-all uppercase tracking-widest text-left ${movie.detailedReview ? 'bg-indigo-50 text-indigo-600 border-indigo-100 hover:bg-indigo-100' : 'bg-white text-slate-300 border-slate-100 hover:border-indigo-200'}`}>상세 리뷰</button>
                                    <button onClick={() => handleDeleteMovie(movie.id)} className="w-14 h-14 rounded-2xl bg-white border border-slate-50 text-slate-200 hover:text-red-500 hover:bg-red-50 hover:border-red-100 opacity-0 group-hover:opacity-100 transition-all text-2xl flex items-center justify-center text-left">🗑</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-20 text-center pb-20 border-t border-slate-100 pt-12">
                        <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest text-center leading-loose">
                            별점을 클릭하여 수정할 수 있습니다. <br/>
                            마우스를 한줄평에 1초간 올리면 전체 문장을 볼 수 있습니다. 
                        </p>
                    </footer>

                    <DetailModal movie={selectedMovie} onClose={() => setSelectedMovieId(null)} onSave={handleDetailSave} />
                    <PasswordModal open={Boolean(passwordAction)} value={passwordInput} error={passwordError} onChange={setPasswordInput} onSubmit={submitPassword} onClose={() => setPasswordAction(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
